services:
  redis:
    image: redis:7-alpine
    container_name: project-mrn
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  server:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    image: project-mrn-server:dev
    container_name: project-mrn-server
    depends_on:
      redis:
        condition: service_healthy
    environment:
      MRN_REDIS_URL: redis://redis:6379/0
      MRN_REDIS_KEY_PREFIX: mrn:dev
      MRN_GAME_LOG_ARCHIVE_PATH: /app/data/game_logs
      MRN_ARCHIVE_HOT_RETENTION_SECONDS: "300"
      MRN_RESTART_RECOVERY_POLICY: abort_in_progress
      MRN_LOG_LEVEL: INFO
      MRN_DEBUG_GAME_LOGS: ${MRN_DEBUG_GAME_LOGS:-0}
      MRN_DEBUG_GAME_LOG_DIR: ${MRN_DEBUG_GAME_LOG_DIR:-/app/.log}
      MRN_DEBUG_GAME_LOG_RUN_ID: ${MRN_DEBUG_GAME_LOG_RUN_ID:-}
    ports:
      - "9090:9090"
    volumes:
      - game-logs:/app/data/game_logs
      - ./.log:/app/.log
    command: ["python", "-m", "uvicorn", "apps.server.src.app:app", "--host", "0.0.0.0", "--port", "9090"]
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import json, urllib.request; data=json.load(urllib.request.urlopen('http://127.0.0.1:9090/health', timeout=2)); raise SystemExit(0 if data.get('ok') is True else 1)",
        ]
      interval: 10s
      timeout: 3s
      retries: 6
    restart: unless-stopped

  web:
    image: node:22-alpine
    container_name: project-mrn-web
    working_dir: /app/apps/web
    depends_on:
      server:
        condition: service_healthy
    environment:
      MRN_WEB_API_TARGET: http://server:9090
      VITE_MRN_DEBUG_GAME_LOGS: ${MRN_DEBUG_GAME_LOGS:-0}
    ports:
      - "${MRN_WEB_PORT:-9000}:9000"
    volumes:
      - .:/app
      - web-node-modules:/app/apps/web/node_modules
    command:
      [
        "sh",
        "-c",
        "npm ci && npm run dev -- --host 0.0.0.0 --port 9000 --strictPort",
      ]
    restart: unless-stopped

  prompt-timeout-worker:
    image: project-mrn-server:dev
    container_name: project-mrn-prompt-timeout-worker
    depends_on:
      redis:
        condition: service_healthy
      server:
        condition: service_healthy
    environment:
      MRN_REDIS_URL: redis://redis:6379/0
      MRN_REDIS_KEY_PREFIX: mrn:dev
      MRN_GAME_LOG_ARCHIVE_PATH: /app/data/game_logs
      MRN_RESTART_RECOVERY_POLICY: keep
      MRN_PROMPT_TIMEOUT_WORKER_POLL_INTERVAL_MS: "250"
      MRN_LOG_LEVEL: INFO
      MRN_DEBUG_GAME_LOGS: ${MRN_DEBUG_GAME_LOGS:-0}
      MRN_DEBUG_GAME_LOG_DIR: ${MRN_DEBUG_GAME_LOG_DIR:-/app/.log}
      MRN_DEBUG_GAME_LOG_RUN_ID: ${MRN_DEBUG_GAME_LOG_RUN_ID:-}
    volumes:
      - game-logs:/app/data/game_logs
      - ./.log:/app/.log
    command: ["python", "-m", "apps.server.src.workers.prompt_timeout_worker_app"]
    restart: unless-stopped

  command-wakeup-worker:
    image: project-mrn-server:dev
    container_name: project-mrn-command-wakeup-worker
    depends_on:
      redis:
        condition: service_healthy
      server:
        condition: service_healthy
    environment:
      MRN_REDIS_URL: redis://redis:6379/0
      MRN_REDIS_KEY_PREFIX: mrn:dev
      MRN_GAME_LOG_ARCHIVE_PATH: /app/data/game_logs
      MRN_RESTART_RECOVERY_POLICY: keep
      MRN_COMMAND_WAKEUP_WORKER_POLL_INTERVAL_MS: "250"
      MRN_LOG_LEVEL: INFO
      MRN_DEBUG_GAME_LOGS: ${MRN_DEBUG_GAME_LOGS:-0}
      MRN_DEBUG_GAME_LOG_DIR: ${MRN_DEBUG_GAME_LOG_DIR:-/app/.log}
      MRN_DEBUG_GAME_LOG_RUN_ID: ${MRN_DEBUG_GAME_LOG_RUN_ID:-}
    volumes:
      - game-logs:/app/data/game_logs
      - ./.log:/app/.log
    command: ["python", "-m", "apps.server.src.workers.command_wakeup_worker_app"]
    restart: unless-stopped

volumes:
  redis-data:
  game-logs:
  web-node-modules:
