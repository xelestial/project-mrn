name: frontend-browser-runtime-tests

on:
  push:
    branches:
      - main
      - "codex/**"
    paths:
      - ".github/workflows/frontend-browser-runtime-tests.yml"
      - "apps/web/**"
      - "packages/runtime-contracts/**"
  pull_request:
    paths:
      - ".github/workflows/frontend-browser-runtime-tests.yml"
      - "apps/web/**"
      - "packages/runtime-contracts/**"
  workflow_dispatch:

jobs:
  frontend-browser-runtime-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run focused browser parity tests
        run: npm run e2e:parity

      - name: Run focused human runtime browser tests
        run: npm run e2e:human-runtime

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/web/playwright-report
          if-no-files-found: ignore
