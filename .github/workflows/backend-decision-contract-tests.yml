name: backend-decision-contract-tests

on:
  push:
    branches:
      - main
      - "codex/**"
  pull_request:

jobs:
  backend-contract-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest fastapi uvicorn

      - name: Run backend decision contract tests
        run: |
          python -m pytest apps/server/tests/test_runtime_contract_examples.py apps/server/tests/test_runtime_service.py apps/server/tests/test_stream_api.py -q
