name: ci

on:
  push:
    branches:
      - main
      - "codex/**"
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest fastapi "uvicorn[standard]" websockets

      - name: Run backend tests
        env:
          PYTHONPATH: .
        run: pytest apps/server/tests -q

      - name: Check parameter manifest snapshot gate
        env:
          PYTHONPATH: .
        run: python tools/parameter_manifest_gate.py --check

      - name: Check legacy path references in active code roots
        env:
          PYTHONPATH: .
        run: python tools/legacy_path_audit.py --roots apps packages tools --strict

      - name: Check UTF-8 encoding gate (cp949 disallowed)
        env:
          PYTHONPATH: .
        run: python tools/encoding_gate.py

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install web dependencies
        working-directory: apps/web
        run: npm ci

      - name: Run web tests
        working-directory: apps/web
        run: npm run test

      - name: Build web
        working-directory: apps/web
        run: npm run build

      - name: Install Playwright browser
        working-directory: apps/web
        run: npx playwright install --with-deps chromium

      - name: Run web e2e
        working-directory: apps/web
        run: npm run e2e
